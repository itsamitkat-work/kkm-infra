name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Postgres and apply migrations
        run: |
          supabase db start
          supabase db reset --yes

      - name: Check generated DB types match repo
        run: |
          supabase gen types typescript --local > packages/db/src/database.types.ts.gen
          if ! diff -q packages/db/src/database.types.ts packages/db/src/database.types.ts.gen; then
            echo "packages/db/src/database.types.ts is out of date. Run: pnpm db:types"
            diff -u packages/db/src/database.types.ts packages/db/src/database.types.ts.gen || true
            exit 1
          fi
          rm packages/db/src/database.types.ts.gen

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec turbo run build lint --filter=web...

      - run: pnpm exec turbo run build lint test --filter=python-api

  deploy:
    if: github.event_name == 'push'
    needs: [supabase, js]
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy to staging
        if: github.ref == 'refs/heads/develop' && env.SUPABASE_ACCESS_TOKEN != ''
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ secrets.STAGING_PROJECT_ID }}
          supabase db push

      - name: Deploy to production
        if: github.ref == 'refs/heads/main' && env.SUPABASE_ACCESS_TOKEN != ''
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ secrets.PRODUCTION_PROJECT_ID }}
          supabase db push
